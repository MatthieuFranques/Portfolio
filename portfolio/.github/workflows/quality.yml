name: "Next.js Quality Check"

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Replace to 'pnpm' or 'yarn' if necesary

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Production Build
        run: npm run build